<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vishant Kataria's personal website">
  <title>vishant.xyz</title>
  <link rel="icon" href="learnings/image/fevicone_new_best.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1f2226 0%, #111214 100%);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      color: #9da3a8;
      font-size: 0.95rem;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link-card {
      display: block;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 28px 36px;
      min-width: 200px;
      transition: all 0.3s ease;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(-3px);
    }

    .link-card .icon {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .link-card .label {
      font-size: 1rem;
      font-weight: 500;
      color: #f0f0f0;
    }

    .link-card .desc {
      font-size: 0.8rem;
      color: #999;
      margin-top: 4px;
    }

    footer {
      position: fixed;
      bottom: 20px;
      color: #666;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>vishant.me</h1>
    <p class="subtitle">welcome to my corner of the internet</p>

    <div class="links">
      <a href="/learnings" class="link-card">
        <div class="icon">📖</div>
        <div class="label">HTML Learnings</div>
        <div class="desc">where it all started</div>
      </a>
      <a href="/projects" class="link-card">
        <div class="icon">🛠️</div>
        <div class="label">All Projects</div>
        <div class="desc">things i've built</div>
      </a>
    </div>
  </div>

  <footer>&copy; vishant kataria</footer>
</body>
</html>
