<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="All my projects - vishant.xyz">
  <title>My Projects | vishant.xyz</title>
  <link rel="icon" href="../image/dailycalculator.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="/" class="header-back">← Home</a>
      <h1>My Projects</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn-secondary" title="Toggle theme">☀️ Light</button>
        <button id="add-btn" class="btn-primary">+ Add Project</button>
      </div>
    </div>
  </header>

  <main>
    <div id="project-list" class="project-list"></div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p>No projects yet.</p>
      <p>Click <strong>+ Add Project</strong> to get started.</p>
    </div>

    <div id="loading-state" class="empty-state">
      <p>Loading projects...</p>
    </div>
  </main>

  <!-- Modal for Add / Edit -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add Project</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <form id="project-form">
        <!-- Type selector -->
        <label>Project Type</label>
        <div class="type-toggle" id="type-toggle">
          <button type="button" class="type-btn active" data-type="local">Local</button>
          <button type="button" class="type-btn" data-type="deployed">Deployed</button>
        </div>
        <input type="hidden" id="input-type" value="local">

        <label for="input-name">Project Name</label>
        <input type="text" id="input-name" placeholder="e.g. My Portfolio" required>

        <!-- Local fields -->
        <div id="local-fields">
          <label for="input-local">Local Link</label>
          <input type="url" id="input-local" placeholder="http://localhost:3000">

          <label for="input-drive">Google Drive Link (Zip File)</label>
          <input type="url" id="input-drive" placeholder="https://drive.google.com/file/d/...">

          <label for="input-path">Project Folder Name (after extracting)</label>
          <input type="text" id="input-path" placeholder="my-app">

          <label for="input-cmd">Start Command</label>
          <input type="text" id="input-cmd" placeholder="npm start">
        </div>

        <!-- Deployed fields -->
        <div id="deployed-fields" style="display:none;">
          <label for="input-deployed">Deployed Link</label>
          <input type="url" id="input-deployed" placeholder="https://my-app.vercel.app">
        </div>

        <div class="form-actions">
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
